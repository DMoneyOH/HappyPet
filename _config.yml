title: Happy Pet Product Reviews
description: In-depth, honest pet product reviews for dog and cat owners. Find the best gear for your happy pet.
baseurl: ''
url: 'https://happypetproductreviews.com'
author: Happy Pet Product Reviews Team
email: 'hello@happypetproductreviews.com'
show_excerpts: true
excerpt_separator: "\n\n"
permalink: /:categories/:title/

# Keep pipeline source, data, and internal docs out of the published site.
# Setting `exclude:` replaces Jekyll's built-in defaults, which cover
# bundler's vendored gems — CI installs into ./vendor, so keep these listed.
exclude:
  - vendor
  - node_modules
  - .sass-cache
  - .jekyll-cache
  - gemfiles
  - "*.py"
  - "*.py.bak*"
  - "*.log"
  - AUDIT_FINDINGS.md
  - AUDIT_ADDENDUM.md
  - BETA_PLAN_REVIEW.md
  - PIPELINE_AUDIT_HANDOVER.md
  - products.json
  - requirements.txt
  - Gemfile
  - Gemfile.lock
  - LOGS
  - scripts
  - _pin_queue
  - PENDING_DRAFTS.json
  - GENERATION_RESULT.json
  - "events:"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from
defaults:
  - scope:
      path: ''
      type: posts
    values:
      layout: post
      author: Happy Pet Product Reviews Team

# Social sharing image (og:image)
social:
  name: Happy Pet Product Reviews
  links:
    - https://www.pinterest.com/happypetproductreviews

# jekyll-seo-tag
logo: /assets/images/og-image.png
twitter:
  card: summary_large_image
