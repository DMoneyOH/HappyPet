---
layout: default
---
{{ content }}
<div class='post-grid'>
{% for post in site.posts %}
  <div class='post-card'>
    <a href='{{ post.url | prepend: site.baseurl }}'>
      <h2>{{ post.title }}</h2>
      <p>{{ post.excerpt | strip_html | truncate: 120 }}</p>
      <span class='read-more'>Read Review →</span>
    </a>
  </div>
{% endfor %}
</div>
