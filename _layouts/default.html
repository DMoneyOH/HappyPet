<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name='description' content='{{ page.description | default: site.description }}'>
  <link rel='stylesheet' href='{{ site.baseurl }}/assets/css/style.css'>
  {% seo %}
</head>
<body>
  <header>
    <div class='container'>
      <a href='{{ site.baseurl }}/' class='logo'>🐾 {{ site.title }}</a>
      <nav>
        <a href='{{ site.baseurl }}/'>Home</a>
        <a href='{{ site.baseurl }}/dogs/'>Dogs</a>
        <a href='{{ site.baseurl }}/cats/'>Cats</a>
      </nav>
    </div>
  </header>
  <main class='container'>
    {{ content }}
  </main>
  <footer>
    <div class='container'>
      <p>As an Amazon Associate and Chewy affiliate, PawPicks earns from qualifying purchases.</p>
      <p>&copy; {{ site.time | date: '%Y' }} PawPicks</p>
    </div>
  </footer>
</body>
</html>
