{% assign cards = "" | split: "" %}
{% comment %}Rotating hero cards — JS picks 2 random on each load{% endcomment %}
<div class="hero-visual">
  <div class="hero-pet-photo">
    <img src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=480&q=80&auto=format&fit=crop"
         alt="Happy golden retriever smiling"
         class="pet-img pet-dog"
         loading="eager">
    <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=320&q=80&auto=format&fit=crop"
         alt="Cute cat looking at camera"
         class="pet-img pet-cat"
         loading="eager">
  </div>
  <div class="hero-cards" id="hero-cards">
    <!-- Populated by JS on load -->
  </div>
</div>

<script>
(function(){
  var CARDS = [
    { emoji:'🦮', label:'Dog Collars',     sub:'Small breed picks',    url:'/pawpicks/pet-accessories/best-dog-collars-small-breeds/',    color:'#FF6B4A' },
    { emoji:'😺', label:'Cat Scratchers',  sub:'That actually last',   url:'/pawpicks/pet-accessories/best-cat-scratching-posts/',        color:'#0D5C63' },
    { emoji:'🐕', label:'No-Pull Harness', sub:'For strong pullers',   url:'/pawpicks/pet-accessories/best-no-pull-dog-harness/',         color:'#FF6B4A' },
    { emoji:'🐈', label:'Cat Feeders',     sub:'Auto feeding picks',   url:'/pawpicks/pet-accessories/best-automatic-cat-feeder/',        color:'#0D5C63' },
    { emoji:'🎾', label:'Dog Toys',        sub:'For tough chewers',    url:'/pawpicks/pet-accessories/best-dog-toys-aggressive-chewers/', color:'#FF6B4A' },
    { emoji:'🛁', label:'Cat Litter',      sub:'Odor control rated',   url:'/pawpicks/pet-accessories/best-cat-litter-odor-control/',     color:'#0D5C63' },
    { emoji:'🛏️', label:'Dog Beds',       sub:'Large breed comfort',  url:'/pawpicks/pet-accessories/best-dog-beds-large-breeds/',       color:'#FF6B4A' },
    { emoji:'💧', label:'Water Fountains', sub:'Cats & dogs love it',  url:'/pawpicks/pet-accessories/best-pet-water-fountain/',          color:'#0D5C63' },
    { emoji:'📋', label:'Training Pads',   sub:'Puppy essentials',     url:'/pawpicks/pet-accessories/best-puppy-training-pads/',         color:'#FF6B4A' },
    { emoji:'✈️', label:'Cat Carriers',   sub:'Travel vet-ready',     url:'/pawpicks/pet-accessories/best-cat-carrier-travel/',          color:'#0D5C63' },
  ];

  // Pick 2 random non-repeating cards
  var shuffled = CARDS.slice().sort(function(){ return Math.random()-.5; });
  var picks = shuffled.slice(0,2);
  var container = document.getElementById('hero-cards');
  if(!container) return;

  picks.forEach(function(c){
    var a = document.createElement('a');
    a.className = 'hero-card';
    a.href = c.url;
    a.style.setProperty('--card-accent', c.color);
    a.innerHTML =
      '<div class="hc-accent"></div>' +
      '<div class="hc-body">' +
        '<span class="hc-emoji">' + c.emoji + '</span>' +
        '<div><div class="hc-label">' + c.label + '</div>' +
        '<div class="hc-sub">' + c.sub + '</div></div>' +
      '</div>' +
      '<div class="hc-cta">Read →</div>';
    container.appendChild(a);
  });
})();
</script>
