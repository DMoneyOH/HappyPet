name: Stage 0 — Refill Product Queue

# Keeps products.json fed. Runs after each publish (when the unpublished
# count actually drops) and no-ops unless the queue is at or below the
# threshold (default 1). Changes land as a PR for human review -- this
# workflow never commits to main.
on:
  workflow_run:
    workflows: ["Stage 2 — Publish Articles"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if the queue is above the threshold (true/false)'
        required: false
        default: 'false'
      batch:
        description: 'Override number of new topics (default 10)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: happypet-refill
  cancel-in-progress: false

jobs:
  refill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Skip if a refill PR is already open
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh pr list --repo "${GITHUB_REPOSITORY}" --state open \
            --search "head:refill/" --json number --jq length)
          echo "open=${OPEN}" >> "$GITHUB_OUTPUT"
          if [ "${OPEN}" != "0" ]; then
            echo "An open refill/* PR already exists -- skipping to avoid stacking duplicates"
          fi

      - name: Set up Python
        if: steps.existing.outputs.open == '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        if: steps.existing.outputs.open == '0'
        run: pip install --quiet -r requirements.txt

      - name: Run refill agent
        if: steps.existing.outputs.open == '0'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMPACT_ACCOUNT_SID: ${{ secrets.IMPACT_ACCOUNT_SID }}
          IMPACT_AUTH_TOKEN: ${{ secrets.IMPACT_AUTH_TOKEN }}
          FORCE_REFILL: ${{ github.event.inputs.force == 'true' && '1' || '' }}
          REFILL_BATCH: ${{ github.event.inputs.batch || '10' }}
        run: python3 refill_products.py

      - name: Open review PR
        if: steps.existing.outputs.open == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git diff --quiet products.json 2>/dev/null; then
            BRANCH="refill/$(date '+%Y-%m-%d-%H%M')"
            git config user.name  "HappyPet Bot"
            git config user.email "hello@happypetproductreviews.com"
            git checkout -b "${BRANCH}"
            git add products.json
            git commit -m "auto: refill product queue $(date '+%Y-%m-%d')"
            git push origin "${BRANCH}"
            python3 - <<'PYEOF' > pr_body.md
          import json
          r = json.load(open("REFILL_RESULT.json"))
          products = {e["topic"]: e for e in json.load(open("products.json"))}
          print("Automated queue refill -- review each product, then merge.\n")
          print("| Topic | Product | Price | Stars | Link | Image |")
          print("|---|---|---|---|---|---|")
          for slug in r["backfilled"] + r["added_resolved"]:
              e = products[slug]
              print(f"| `{slug}` | {e['name'][:60]} | ${e['price']} | {e['stars']} "
                    f"| [{e['asin']}]({e['affiliate_url']}) | <img src=\"{e['image']}\" width=\"80\"> |")
          held = r["added_placeholder"] + r["backfill_still_held"]
          if held:
              print("\n⚠️ **Left as NEEDS_ASIN/NEEDS_IMAGE (Amazon lookup failed -- fill manually "
                    "or re-dispatch the refill workflow):** " + ", ".join(f"`{s}`" for s in held))
          print("\nEvery resolved entry passed: ASIN shape check, image-host check, and an "
                "LLM topic-fit check. Placeholder entries cannot publish (validate_product holds them).")
          print("\n_Auto-generated by refill.yml_")
          PYEOF
            gh pr create --repo "${GITHUB_REPOSITORY}" \
              --base main --head "${BRANCH}" \
              --title "Refill: new product topics $(date '+%Y-%m-%d')" \
              --body-file pr_body.md
          else
            echo "products.json unchanged -- no PR needed"
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refill-logs-${{ github.run_id }}
          path: |
            LOGS/
            REFILL_RESULT.json
          if-no-files-found: ignore
          retention-days: 14
