name: Weekly — Chewy Link Validation

on:
  schedule:
    # Every Sunday 6:00 AM ET = 11:00 UTC
    - cron: '0 11 * * 0'
  workflow_dispatch:
    inputs:
      fix:
        description: 'Clear bad chewy_url entries in products.json (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "HappyPet Bot"
          git config user.email "hello@happypetproductreviews.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run Chewy link validation
        id: validate
        env:
          IMPACT_ACCOUNT_SID: ${{ secrets.IMPACT_ACCOUNT_SID }}
          IMPACT_AUTH_TOKEN:   ${{ secrets.IMPACT_AUTH_TOKEN }}
        run: |
          FIX_FLAG=""
          if [ "${{ github.event.inputs.fix }}" = "true" ]; then FIX_FLAG="--fix"; fi
          if python3 validate_published_chewy_links.py $FIX_FLAG; then
            echo "validation_failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "validation_failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build issue body
        id: issue_body
        if: steps.validate.outputs.validation_failed == 'true'
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path
          report = sorted(Path('.').glob('chewy_link_validation_*.json'))
          if not report:
              body = 'Validation report not found.'
          else:
              d = json.loads(report[-1].read_text())
              mismatches = [r for r in d['results'] if r['status'] == 'MISMATCH']
              lines = [f"Chewy link validation found mismatches on {d['date']}", '']
              for m in mismatches:
                  lines.append(f"- **{m['slug']}**: {m['detail']}")
              lines += ['', 'Run with --fix flag to clear bad entries and re-run chewy_lookup.', '', '_Auto-generated by chewy_validate.yml_']
              body = '\n'.join(lines)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write('ISSUE_BODY<<BODY_EOF\n')
              f.write(body + '\n')
              f.write('BODY_EOF\n')
          PYEOF

      - name: Create GitHub issue on mismatch
        if: steps.validate.outputs.validation_failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo DMoneyOH/HappyPet \
            --title "Chewy link validation: mismatches detected $(date '+%Y-%m-%d')" \
            --body "$ISSUE_BODY" \
            --assignee DMoneyOH || true

      - name: Commit fix if applied
        if: github.event.inputs.fix == 'true'
        run: |
          git add products.json
          if git diff --cached --quiet; then
            echo "No products.json changes to commit"
          else
            git commit -m "fix: clear bad chewy_url entries (chewy_validate.yml)"
            git push origin main
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chewy-validation-${{ github.run_id }}
          path: chewy_link_validation_*.json
          if-no-files-found: ignore
          retention-days: 30
