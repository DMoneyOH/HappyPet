name: Deploy HappyPet to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '_posts/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-*.md'
      - 'assets/**'
      - '_layouts/**'
      - '_includes/**'
      - '_config.yml'
      - 'Gemfile'
  workflow_dispatch:
  # NOTE: no workflow_run trigger. Stage 2's commit of the dated post already
  # matches the push filter above and fires this deploy once. A second
  # workflow_run trigger double-fired the deploy (and double-dispatched pins).

# Job-scoped where elevated: trigger-pins gets actions:write, deploy gets pages/id-token
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  trigger-pins:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout to read pending-slugs
        uses: actions/checkout@v4

      - name: Dispatch Stage 3 if pending slugs exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PENDING="_pin_queue/.pending-slugs"
          if [ ! -f "$PENDING" ]; then
            echo "No .pending-slugs found — skipping pin dispatch"
            exit 0
          fi
          SLUGS=$(cat "$PENDING" | tr -d '[:space:]')
          if [ -z "$SLUGS" ]; then
            echo ".pending-slugs is empty — skipping pin dispatch"
            exit 0
          fi
          echo "Dispatching pin.yml for slugs: ${SLUGS}"
          gh workflow run pin.yml \
            --repo "${{ github.repository }}" \
            --field slugs="${SLUGS}"
