name: Stage 1 — Generate Articles

on:
  schedule: # re-enabled 2026-07-02 — recovery (was disabled 2026-05-25 for a beta rebuild that never happened)
    # Mon + Thu 8:15 UTC = 4:15 AM EDT / 3:15 AM EST
    - cron: '15 8 * * 1,4'
  workflow_dispatch:
    inputs:
      force_cap:
        description: 'Override article cap (1 or 2)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

concurrency:
  group: happypet-generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "HappyPet Bot"
          git config user.email "hello@happypetproductreviews.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install --quiet -r requirements.txt

      - name: Write GCP service account key
        run: |
          echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 -d > happypet-sheets-key.json
          echo "Key written: $(wc -c < happypet-sheets-key.json) bytes"

      - name: Check products.json queue
        id: queue_check
        run: |
          count=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('products.json'))
              print(len(data))
          except Exception:
              print(0)
          ")
          echo "queue_count=${count}" >> "$GITHUB_OUTPUT"
          echo "Products in queue: ${count}"
          if [ "$count" -eq 0 ]; then
            echo "Queue empty — nothing to generate"
          fi

      - name: Determine cap
        id: cap
        run: |
          OVERRIDE="${{ github.event.inputs.force_cap }}"
          if [ -n "$OVERRIDE" ]; then
            echo "cap=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Generate cap (override): ${OVERRIDE}"
          else
            DOW=$(date '+%u')
            if [ "$DOW" = "1" ]; then
              echo "cap=2" >> "$GITHUB_OUTPUT"
              echo "Monday run — cap 2"
            else
              echo "cap=1" >> "$GITHUB_OUTPUT"
              echo "Thursday run — cap 1"
            fi
          fi

      - name: Run generator
        if: steps.queue_check.outputs.queue_count != '0'
        env:
          MAX_ARTICLES: ${{ steps.cap.outputs.cap }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          HAPPYPET_SHEET_ID_DOGS: ${{ secrets.HAPPYPET_SHEET_ID_DOGS }}
          HAPPYPET_SHEET_ID_CATS: ${{ secrets.HAPPYPET_SHEET_ID_CATS }}
          HAPPYPET_SHEET_ID_HOME: ${{ secrets.HAPPYPET_SHEET_ID_HOME }}
          HAPPYPET_SHEET_ID_FOOD: ${{ secrets.HAPPYPET_SHEET_ID_FOOD }}
          HAPPYPET_SHEET_ID_TOYS: ${{ secrets.HAPPYPET_SHEET_ID_TOYS }}
          HAPPYPET_SHEET_ID_HEALTH: ${{ secrets.HAPPYPET_SHEET_ID_HEALTH }}
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_ACCOUNT: ${{ secrets.GMAIL_ACCOUNT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMPACT_ACCOUNT_SID: ${{ secrets.IMPACT_ACCOUNT_SID }}
          IMPACT_AUTH_TOKEN: ${{ secrets.IMPACT_AUTH_TOKEN }}
        run: python3 generate_posts.py

      - name: Validate generation result
        if: steps.queue_check.outputs.queue_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Gate BEFORE committing: never push drafts from a run whose generator crashed
          if [ ! -f "GENERATION_RESULT.json" ]; then
            echo "ERROR: GENERATION_RESULT.json not written -- generator may have crashed"
            exit 1
          fi
          GENERATED=$(python3 -c "import json; d=json.load(open('GENERATION_RESULT.json')); print(d['articles_generated'])")
          HELD=$(python3 -c "import json; d=json.load(open('GENERATION_RESULT.json')); print(d['articles_held'])")
          echo "Generated: ${GENERATED} | Held: ${HELD}"
          if [ "${GENERATED}" = "0" ] && [ "${HELD}" = "0" ]; then
            echo "ERROR: 0 articles generated and 0 held -- provider failure or empty queue. Failing workflow."
            exit 1
          fi
          if [ "${GENERATED}" = "0" ]; then
            # Every article was held: the run is not a hard failure, but nothing
            # will publish -- surface it instead of passing silently green.
            TITLE="[Pipeline] Stage 1 run produced only held articles"
            OPEN_COUNT=$(gh issue list --repo "${GITHUB_REPOSITORY}" --state open \
              --search "\"${TITLE}\" in:title" --json number --jq length || echo 1)
            if [ "${OPEN_COUNT}" = "0" ]; then
              gh issue create --repo "${GITHUB_REPOSITORY}" \
                --title "${TITLE}" \
                --body "Run $(date '+%Y-%m-%d'): articles_generated=0, articles_held=${HELD}. Held articles never publish without intervention -- check LOGS artifact for hold reasons (validation placeholders, review failures). Close this issue once the queue moves again. _Auto-generated by generate.yml_" || true
            else
              echo "All-held notice issue already open -- not filing a duplicate"
            fi
          fi
          echo "Generation result OK"

      - name: Commit generated files
        run: |
          # Stash only when there is something to stash, and let a conflicting
          # pop fail loudly -- `|| true` here silently vanished generated drafts.
          STASHED=0
          if [ -n "$(git status --porcelain)" ]; then
            git stash --include-untracked -q
            STASHED=1
          fi
          git pull --rebase origin main
          if [ "$STASHED" = "1" ]; then
            git stash pop -q
          fi
          git add _posts/ assets/images/pins/ _pin_queue/ products.json PENDING_DRAFTS.json 2>/dev/null || true
          STAGED=$(git diff --cached --name-only)
          if [ -z "$STAGED" ]; then
            echo "No files changed -- no commit needed"
          else
            git commit -m "auto: stage generated files $(date '+%Y-%m-%d')"
            git push origin main
            echo "Committed generated files"
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generate-logs-${{ github.run_id }}
          path: LOGS/
          if-no-files-found: ignore
          retention-days: 14
