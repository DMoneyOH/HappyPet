name: Stage 3 — Post Pins

on:
  # Automatic: fires when Stage 2 completes successfully (H3 fix)
  workflow_run:
    workflows: ["Stage 2 — Publish Articles"]
    types: [completed]
  # Manual: override slugs or force re-fire
  workflow_dispatch:
    inputs:
      slugs:
        description: 'Comma-separated slugs to pin (leave empty to read from .pending-slugs)'
        required: false
        default: ''
      force:
        description: 'Re-fire already-sent pins (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write
  issues: write

jobs:
  pin:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # On workflow_run: only proceed if Stage 2 succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "HappyPet Bot"
          git config user.email "hello@happypetproductreviews.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install --quiet -r requirements.txt

      - name: Resolve slugs
        id: resolve
        run: |
          # Manual trigger: use input if provided, else fall back to .pending-slugs
          # Automatic trigger (workflow_run): always read .pending-slugs
          INPUT_SLUGS="${{ github.event.inputs.slugs }}"
          PENDING="_pin_queue/.pending-slugs"

          if [ -n "$INPUT_SLUGS" ]; then
            SLUGS="$INPUT_SLUGS"
            echo "Slugs from workflow_dispatch input: ${SLUGS}"
          elif [ -f "$PENDING" ]; then
            SLUGS=$(cat "$PENDING")
            echo "Slugs from .pending-slugs: ${SLUGS}"
          else
            echo "No slugs from input or .pending-slugs — nothing to pin"
            echo "slugs=" >> "$GITHUB_OUTPUT"
            echo "nothing_to_pin=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$SLUGS" ]; then
            echo "Empty slug list — nothing to pin"
            echo "slugs=" >> "$GITHUB_OUTPUT"
            echo "nothing_to_pin=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "slugs=${SLUGS}" >> "$GITHUB_OUTPUT"
          echo "nothing_to_pin=false" >> "$GITHUB_OUTPUT"
          echo "Resolved slugs: ${SLUGS}"

      - name: Write GCP service account key
        if: steps.resolve.outputs.nothing_to_pin != 'true'
        run: |
          echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 -d > happypet-sheets-key.json

      - name: Wait for article and image liveness
        id: liveness
        if: steps.resolve.outputs.nothing_to_pin != 'true'
        run: |
          SLUGS="${{ steps.resolve.outputs.slugs }}"
          IFS=',' read -ra SLUG_LIST <<< "$SLUGS"
          MAX_WAIT=1800
          POLL=30
          ELAPSED=0

          echo "Checking liveness for slugs: ${SLUGS}"
          sleep 30

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            ALL_LIVE=true
            for slug in "${SLUG_LIST[@]}"; do
              slug=$(echo "$slug" | tr -d '[:space:]')
              PIN_JSON="_pin_queue/${slug}.json"
              if [ ! -f "$PIN_JSON" ]; then
                echo "  [${ELAPSED}s] ${slug}: JSON in sent/ — skipping liveness"
                continue
              fi
              ART_URL=$(python3 -c "import json; d=json.load(open('${PIN_JSON}')); print(d.get('article_url','').split('?')[0].rstrip('/')+'/')")
              IMG_URL=$(python3 -c "import json; d=json.load(open('${PIN_JSON}')); u=d.get('image_url','').split('?')[0]; print(u)")
              ART_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$ART_URL" || echo "000")
              IMG_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$IMG_URL" || echo "000")
              echo "  [${ELAPSED}s] ${slug}: article=${ART_CODE} image=${IMG_CODE}"
              if [ "$ART_CODE" != "200" ] || [ "$IMG_CODE" != "200" ]; then
                ALL_LIVE=false
              fi
            done
            if [ "$ALL_LIVE" = "true" ]; then
              echo "All articles and images confirmed live at ${ELAPSED}s"
              echo "live=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep $POLL
            ELAPSED=$(( ELAPSED + POLL ))
          done

          echo "ERROR: Liveness timeout after ${MAX_WAIT}s — aborting pin fire"
          echo "live=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Post pins via IFTTT Maker webhooks
        if: steps.resolve.outputs.nothing_to_pin != 'true'
        env:
          IFTTT_MAKER_KEY:          ${{ secrets.IFTTT_MAKER_KEY }}
          GCP_SA_KEY_B64:           ${{ secrets.GCP_SA_KEY_B64 }}
          HAPPYPET_SHEET_ID_DOGS:   ${{ secrets.HAPPYPET_SHEET_ID_DOGS }}
          HAPPYPET_SHEET_ID_CATS:   ${{ secrets.HAPPYPET_SHEET_ID_CATS }}
          HAPPYPET_SHEET_ID_HOME:   ${{ secrets.HAPPYPET_SHEET_ID_HOME }}
          HAPPYPET_SHEET_ID_FOOD:   ${{ secrets.HAPPYPET_SHEET_ID_FOOD }}
          HAPPYPET_SHEET_ID_TOYS:   ${{ secrets.HAPPYPET_SHEET_ID_TOYS }}
          HAPPYPET_SHEET_ID_HEALTH: ${{ secrets.HAPPYPET_SHEET_ID_HEALTH }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FORCE_FLAG="--force"; fi
          python3 post_pins.py --slugs "${{ steps.resolve.outputs.slugs }}" $FORCE_FLAG

      - name: Push pins to Google Sheets
        if: steps.resolve.outputs.nothing_to_pin != 'true'
        env:
          FACEBOOK_QUEUE_SHEET_ID:  ${{ secrets.FACEBOOK_QUEUE_SHEET_ID }}
          GCP_SA_KEY_B64:           ${{ secrets.GCP_SA_KEY_B64 }}
          GMAIL_SMTP_USER:          ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_ACCOUNT:            ${{ secrets.GMAIL_ACCOUNT }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 push_pins_to_sheets.py --slugs "${{ steps.resolve.outputs.slugs }}"

      - name: Consume pending-slugs
        if: steps.resolve.outputs.nothing_to_pin != 'true'
        run: |
          PENDING="_pin_queue/.pending-slugs"
          git checkout happypet-sheets-key.json 2>/dev/null || true
          git clean -f happypet-sheets-key.json 2>/dev/null || true
          git pull --rebase origin main
          git add products.json _pin_queue/ LOGS/ 2>/dev/null || true
          if [ -f "$PENDING" ]; then
            git rm "$PENDING" -q
          fi
          if git diff --cached --quiet; then
            echo "Nothing staged — no commit needed"
          else
            git commit -m "chore: retire slug and consume pending-slugs after pin run"
            git push origin main
            echo "Committed and pushed cleanup"
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pin-logs-${{ github.run_id }}
          path: LOGS/
          if-no-files-found: ignore
          retention-days: 14

      - name: Alert on failure
        if: failure() && steps.resolve.outputs.nothing_to_pin != 'true'
        env:
          GMAIL_SMTP_USER:    ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_ACCOUNT:      ${{ secrets.GMAIL_ACCOUNT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 -c "
          import smtplib, os
          from email.mime.text import MIMEText
          slugs   = '${{ steps.resolve.outputs.slugs }}'
          run_id  = '${{ github.run_id }}'
          smtp_user  = os.environ.get('GMAIL_SMTP_USER', '')
          smtp_login = os.environ.get('GMAIL_ACCOUNT', '')
          smtp_pass  = os.environ.get('GMAIL_APP_PASSWORD', '')
          if not smtp_pass:
              print('GMAIL_APP_PASSWORD not set -- skipping alert'); exit(0)
          body = f'Stage 3 (pin.yml) failed for slugs: {slugs}\n\nRun ID: {run_id}\nLogs: https://github.com/DMoneyOH/HappyPet/actions/runs/{run_id}'
          msg = MIMEText(body)
          msg['Subject'] = f'[HappyPet] Pin workflow failed: {slugs}'
          msg['From']    = smtp_user
          msg['To']      = 'hello@happypetproductreviews.com'
          try:
              with smtplib.SMTP('smtp.gmail.com', 587) as s:
                  s.starttls(); s.login(smtp_login, smtp_pass)
                  s.sendmail(smtp_user, ['hello@happypetproductreviews.com'], msg.as_string())
              print('Alert email sent')
          except Exception as e:
              print(f'Alert email failed: {e}')
          "
