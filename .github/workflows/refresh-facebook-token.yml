name: Refresh Facebook Page Token

on:
  schedule:
    - cron: '0 10 1 * *'  # 1st of every month at 10:00 AM UTC
  workflow_dispatch:        # manual trigger as backup

permissions:
  secrets: write            # allows GITHUB_TOKEN to update secrets

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange for fresh 60-day token
        id: refresh
        run: |
          RESPONSE=$(curl -s "https://graph.facebook.com/oauth/access_token?grant_type=fb_exchange_token&client_id=${{ secrets.FACEBOOK_APP_ID }}&client_secret=${{ secrets.FACEBOOK_APP_SECRET }}&fb_exchange_token=${{ secrets.FACEBOOK_PAGE_TOKEN }}")
          # Check for API error before extracting token
          ERROR=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',{}).get('message',''))" 2>/dev/null || echo "")
          if [ -n "$ERROR" ]; then
            echo "❌ Facebook API error: $ERROR"
            echo "Full response: $RESPONSE"
            exit 1
          fi
          NEW_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); t=d.get('access_token',''); print(t) if t else (sys.exit('access_token missing from response: ' + str(d)))")
          # Mask token so it never appears in plaintext logs
          echo "::add-mask::$NEW_TOKEN"
          echo "new_token=$NEW_TOKEN" >> $GITHUB_OUTPUT

      - name: Update FACEBOOK_PAGE_TOKEN secret
        run: |
          gh secret set FACEBOOK_PAGE_TOKEN --body "${{ steps.refresh.outputs.new_token }}" --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify new token
        run: |
          VERIFY=$(curl -s "https://graph.facebook.com/me?access_token=${{ steps.refresh.outputs.new_token }}&fields=name")
          NAME=$(echo $VERIFY | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('name', ''))" 2>/dev/null || echo "")
          if [ -z "$NAME" ]; then
            echo "❌ Token verification failed: $VERIFY"
            exit 1
          fi
          echo "✅ Token valid for: $NAME"
