name: Stage 2 — Publish Articles

on:
  schedule:
    # Mon + Thu 7:00 AM ET = 12:00 UTC (EDT, Apr-Nov)
    - cron: '0 12 * * 1,4'
  workflow_dispatch:
    inputs:
      force_cap:
        description: 'Override post cap (1 or 2)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "HappyPet Bot"
          git config user.email "hello@happypetproductreviews.com"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install --quiet -r requirements.txt

      - name: Write GCP service account key
        run: |
          echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 -d > happypet-sheets-key.json

      - name: Determine post cap
        id: cap
        run: |
          OVERRIDE="${{ github.event.inputs.force_cap }}"
          if [ -n "$OVERRIDE" ]; then
            echo "cap=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Post cap (override): ${OVERRIDE}"
          else
            DOW=$(date '+%u')
            if [ "$DOW" = "1" ]; then
              echo "cap=2" >> "$GITHUB_OUTPUT"
              echo "Monday run — cap 2"
            else
              echo "cap=1" >> "$GITHUB_OUTPUT"
              echo "Thursday run — cap 1"
            fi
          fi

      - name: Find and date unpublished posts
        id: stage
        run: |
          CAP="${{ steps.cap.outputs.cap }}"
          TODAY=$(date '+%Y-%m-%d')
          mapfile -t ALL_NEW < <(git ls-files _posts/DRAFT-*.md | sort)
          TOTAL=${#ALL_NEW[@]}
          echo "Found ${TOTAL} DRAFT post(s)"
          if [ "$TOTAL" -eq 0 ]; then
            echo "nothing_to_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "nothing_to_publish=false" >> "$GITHUB_OUTPUT"
          SELECTED=("${ALL_NEW[@]:0:$CAP}")
          SLUGS=()
          URLS=()
          for p in "${SELECTED[@]}"; do
            fname=$(basename "$p" .md)
            slug="${fname#DRAFT-}"
            SLUGS+=("$slug")
            new_path="_posts/${TODAY}-${slug}.md"
            git rm --cached "$p" -q 2>/dev/null || true
            [ "$p" != "$new_path" ] && mv "$p" "$new_path" && echo "  DATED: $p -> $new_path"
            sed -i "s/^date: .*/date: ${TODAY}/" "$new_path"
            git add "$new_path"
            pin_img="assets/images/pins/${slug}.jpg"
            [ -f "$pin_img" ] && git add "$pin_img" && echo "  STAGED pin: $pin_img"
            # Derive article URL from pin queue JSON (has full category path)
            pin_json="_pin_queue/${slug}.json"
            if [ -f "$pin_json" ]; then
              art_url=$(python3 -c "import json; d=json.load(open('${pin_json}')); print(d.get('article_url','').split('?')[0].rstrip('/')+'/')")
              URLS+=("$art_url")
              echo "  URL: $art_url"
            fi
          done
          SLUGS_CSV=$(IFS=','; echo "${SLUGS[*]}")
          URLS_CSV=$(IFS=','; echo "${URLS[*]}")
          echo "slugs=${SLUGS_CSV}" >> "$GITHUB_OUTPUT"
          echo "urls=${URLS_CSV}"   >> "$GITHUB_OUTPUT"
          echo "publish_count=${#SELECTED[@]}" >> "$GITHUB_OUTPUT"
          REMAINING=$(( TOTAL - ${#SELECTED[@]} ))
          echo "remaining=${REMAINING}" >> "$GITHUB_OUTPUT"
          echo "Staged ${#SELECTED[@]} post(s): ${SLUGS_CSV}"

      - name: Commit and push
        if: steps.stage.outputs.nothing_to_publish == 'false'
        run: |
          COUNT="${{ steps.stage.outputs.publish_count }}"
          TODAY=$(date '+%Y-%m-%d')
          git commit -m "auto: publish ${TODAY} [${COUNT} post(s)]"
          git push origin main
          echo "Pushed — Jekyll build triggered"

      - name: Wait for articles to go live
        if: steps.stage.outputs.nothing_to_publish == 'false'
        id: liveness
        run: |
          URLS="${{ steps.stage.outputs.urls }}"
          if [ -z "$URLS" ]; then
            echo "No URLs to check — assuming live"
            echo "live=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          IFS=',' read -ra URL_LIST <<< "$URLS"
          MAX_WAIT=3600
          POLL=30
          ELAPSED=0
          echo "Checking liveness for: ${URLS}"
          # Initial wait — Pages build takes at least 60s
          sleep 60
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            ALL_LIVE=true
            for url in "${URL_LIST[@]}"; do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo "000")
              echo "  [${ELAPSED}s] ${url} -> HTTP ${CODE}"
              if [ "$CODE" != "200" ]; then
                ALL_LIVE=false
              fi
            done
            if [ "$ALL_LIVE" = "true" ]; then
              echo "live=true" >> "$GITHUB_OUTPUT"
              echo "All articles confirmed live at ${ELAPSED}s"
              exit 0
            fi
            sleep $POLL
            ELAPSED=$(( ELAPSED + POLL ))
          done
          # Timeout — still push pins. Article is almost certainly live,
          # Pages just didn't return 200 within the window.
          echo "live=true" >> "$GITHUB_OUTPUT"
          echo "Liveness timeout (${MAX_WAIT}s) — proceeding anyway"

      - name: Post pins via IFTTT Maker webhooks
        if: steps.stage.outputs.nothing_to_publish == 'false' && steps.liveness.outputs.live == 'true'
        env:
          IFTTT_MAKER_KEY:          ${{ secrets.IFTTT_MAKER_KEY }}
          HAPPYPET_SHEET_ID_DOGS:   ${{ secrets.HAPPYPET_SHEET_ID_DOGS }}
          HAPPYPET_SHEET_ID_CATS:   ${{ secrets.HAPPYPET_SHEET_ID_CATS }}
          HAPPYPET_SHEET_ID_HOME:   ${{ secrets.HAPPYPET_SHEET_ID_HOME }}
          HAPPYPET_SHEET_ID_FOOD:   ${{ secrets.HAPPYPET_SHEET_ID_FOOD }}
          HAPPYPET_SHEET_ID_TOYS:   ${{ secrets.HAPPYPET_SHEET_ID_TOYS }}
          HAPPYPET_SHEET_ID_HEALTH: ${{ secrets.HAPPYPET_SHEET_ID_HEALTH }}
        run: |
          python3 post_pins.py --slugs "${{ steps.stage.outputs.slugs }}"

      - name: Push pins to Google Sheets
        if: steps.stage.outputs.nothing_to_publish == 'false' && steps.liveness.outputs.live == 'true'
        env:
          FACEBOOK_QUEUE_SHEET_ID:  ${{ secrets.FACEBOOK_QUEUE_SHEET_ID }}
          GMAIL_SMTP_USER:          ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_ACCOUNT:            ${{ secrets.GMAIL_ACCOUNT }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 push_pins_to_sheets.py --slugs "${{ steps.stage.outputs.slugs }}"

      - name: Queue low — create GitHub issue
        if: steps.stage.outputs.nothing_to_publish == 'false' && fromJSON(steps.stage.outputs.remaining) <= 3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REMAINING="${{ steps.stage.outputs.remaining }}"
          gh issue create \
            --repo DMoneyOH/HappyPet \
            --title "⚠️ Queue low: ${REMAINING} unpublished post(s) remaining" \
            --body "$(printf 'autopublish queue alert (%s)\n\nOnly **%s** unpublished post(s) remain in \`_posts/\`.\n\n**Action needed:** Populate \`products.json\` and trigger Stage 1 before queue runs dry.\n\n_Auto-generated by publish.yml_' "$(date '+%Y-%m-%d')" "$REMAINING")" \
            --assignee DMoneyOH

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-logs-${{ github.run_id }}
          path: LOGS/
          if-no-files-found: ignore
          retention-days: 14
