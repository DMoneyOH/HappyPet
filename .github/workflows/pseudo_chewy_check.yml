name: Scratch — Pseudo Chewy Check (throwaway, do not merge)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run pseudo Chewy check
        env:
          IMPACT_ACCOUNT_SID: ${{ secrets.IMPACT_ACCOUNT_SID }}
          IMPACT_AUTH_TOKEN:   ${{ secrets.IMPACT_AUTH_TOKEN }}
        run: python3 pseudo_chewy_check.py
